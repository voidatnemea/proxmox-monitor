<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nemea Monitoring</title>
<base href="/">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-canvas">
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>
  <div class="bg-blob bg-blob-4"></div>
</div>
<div class="bg-overlay"></div>
<div class="bg-grid"></div>

<div class="page" id="page">
  <div class="detail-header">
    <a class="back-btn" href="/" id="backLink">&larr;</a>
    <div class="detail-header-info">
      <h1 id="sectionTitle">Loading...</h1>
      <div class="subtitle" id="sectionSubtitle"></div>
    </div>
    <span class="status-pill" id="sectionPill"></span>
  </div>

  <div class="detail-section">
    <div class="detail-section-title">Monitors</div>
    <div id="monitorList">
      <div class="loading-wrap"><div class="spinner"></div><span>Loading monitors...</span></div>
    </div>
  </div>
</div>

<script src="status.js"></script>
</body>
</html>
