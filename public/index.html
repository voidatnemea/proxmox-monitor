<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nemea Monitoring</title>
<base href="/">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg-canvas">
  <div class="bg-blob bg-blob-1"></div>
  <div class="bg-blob bg-blob-2"></div>
  <div class="bg-blob bg-blob-3"></div>
  <div class="bg-blob bg-blob-4"></div>
</div>
<div class="rain-layer" id="rainLayer"></div>
<div class="bg-grid"></div>

<div class="page" id="page">
  <div class="header">
    <div class="header-left">
      <h1>Nemea Monitoring</h1>
      <span class="header-badge" id="statusBadge">All Systems Operational</span>
    </div>
    <div class="header-actions">
      <a href="admin.html" class="btn btn-ghost btn-sm">Settings</a>
    </div>
  </div>

  <div class="status-bar" id="statusBar">
    <span class="status-dot red"></span>
    <span id="statusBarText">One or more services are experiencing issues</span>
  </div>

  <div class="section-grid" id="sectionsContainer"></div>
</div>

<script>
(function(){var r=document.getElementById('rainLayer');if(!r)return;for(var i=0;i<50;i++){var s=document.createElement('div');s.className='rain-streak';s.style.left=Math.random()*100+'%';s.style.height=(20+Math.random()*80)+'px';s.style.animationDuration=(0.5+Math.random()*1.5)+'s';s.style.animationDelay=Math.random()*2+'s';s.style.opacity=0.2+Math.random()*0.3;r.appendChild(s)}})();
</script>
<script src="main.js"></script>
</body>
</html>
